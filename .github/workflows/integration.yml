name: Integration

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ios:
    name: iOS Injection Test
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build monorepo
        run: pnpm build

      - name: Build Jig.framework
        run: cd packages/native && pnpm build:framework

      - name: Check device dependencies
        run: node packages/device/dist/cli.js check ios-ci

      - name: Download test app artifact
        uses: actions/download-artifact@v4
        with:
          name: habit-tracker-ios
          path: /tmp/test-app
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ vars.HABIT_TRACKER_BUILD_RUN_ID }}

      - name: Extract test app
        run: |
          cd /tmp/test-app
          tar -xzf habit-tracker-ios.tar.gz
          APP_PATH=$(find /tmp/test-app -name "*.app" | head -1)
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Boot simulator
        run: node packages/device/dist/cli.js boot ios-ci --timeout 60000

      - name: Launch app with Jig
        run: node packages/cli/dist/index.js launch "$APP_PATH" --skip-verify

      - name: Wait for Jig server
        run: node packages/cli/dist/index.js wait --timeout 30000

      - name: Verify connection
        run: node packages/cli/dist/index.js status

      - name: Capture screenshot
        run: |
          node -e "
            const { connect } = require('./packages/sdk/dist');
            (async () => {
              const client = await connect();
              const result = await client.screenshot();
              require('fs').writeFileSync('/tmp/screenshot.png', Buffer.from(result.data, 'base64'));
              console.log('Screenshot captured');
              await client.disconnect();
            })();
          "

      - name: Verify element selection
        run: |
          node -e "
            const { connect } = require('./packages/sdk/dist');
            (async () => {
              const session = await connect();

              // Wait for app to render by polling for a known testID
              let homeScreen;
              const deadline = Date.now() + 20000;
              while (Date.now() < deadline) {
                try {
                  homeScreen = await session.findElement({ testID: 'jig-home-screen' });
                  break;
                } catch (err) {
                  if (err.code !== -32002) throw err;
                  process.stdout.write('.');
                  await new Promise(r => setTimeout(r, 500));
                }
              }
              if (!homeScreen) throw new Error('App did not render jig-home-screen within 20s');
              console.log('\\nApp ready: jig-home-screen found');

              // Test 1: findElements({}) returns meaningful element count
              const all = await session.findElements({});
              console.log('findElements: ' + all.elements.length + ' elements found');
              if (all.elements.length < 15) {
                throw new Error('Expected at least 15 elements, got ' + all.elements.length);
              }

              // Test 2: At least one element has testID
              const withTestID = all.elements.find(el => el.testID);
              if (!withTestID) {
                throw new Error('No elements with testID found — test app must have testID props');
              }
              const byTestID = await session.findElement({ testID: withTestID.testID });
              if (byTestID.element.reactTag !== withTestID.reactTag) {
                throw new Error('testID lookup returned wrong element');
              }
              console.log('findElement by testID: ' + withTestID.testID);

              // Test 4: Nonexistent testID returns ELEMENT_NOT_FOUND
              try {
                await session.findElement({ testID: 'jig-nonexistent-xyz' });
                throw new Error('Expected ELEMENT_NOT_FOUND error');
              } catch (err) {
                if (err.code !== -32002) throw new Error('Wrong error code: ' + err.code);
                console.log('ELEMENT_NOT_FOUND: correct error code');
              }

              // Test 5: text selector — must match non-trivial text
              const withText = all.elements.find(el => el.text && el.text.trim().length > 0);
              if (!withText) {
                throw new Error('No elements with non-empty text found');
              }
              const byText = await session.findElement({ text: withText.text });
              if (byText.element.text !== withText.text) {
                throw new Error('text selector mismatch');
              }
              console.log('findElement by text: \"' + withText.text + '\"');

              // Test 6: role selector with selectivity check
              const withRole = all.elements.find(el => el.role);
              if (!withRole) {
                throw new Error('No elements with role found');
              }
              const byRole = await session.findElement({ role: withRole.role });
              if (byRole.element.role !== withRole.role) {
                throw new Error('role selector returned element with wrong role');
              }
              const allByRole = await session.findElements({ role: withRole.role });
              for (const el of allByRole.elements) {
                if (el.role !== withRole.role) {
                  throw new Error('findElements({role}) returned element with role=' + el.role + ', expected ' + withRole.role);
                }
              }
              console.log('findElement by role: ' + withRole.role + ' (' + allByRole.elements.length + ' total, all match)');

              // Test 7: AND selector (text + role)
              const withTextAndRole = all.elements.find(el => el.text && el.text.trim().length > 0 && el.role);
              if (withTextAndRole) {
                const byAnd = await session.findElement({ text: withTextAndRole.text, role: withTextAndRole.role });
                if (byAnd.element.text !== withTextAndRole.text || byAnd.element.role !== withTextAndRole.role) {
                  throw new Error('AND selector mismatch');
                }
                console.log('AND selector: text=\"' + withTextAndRole.text + '\" + role=' + withTextAndRole.role);
              } else {
                throw new Error('No elements with both non-empty text and role');
              }

              // Test 8: structural validation — meaningful values
              let hasVisibleElement = false;
              let hasNonZeroFrame = false;
              for (const el of all.elements) {
                if (typeof el.frame?.x !== 'number' || typeof el.frame?.y !== 'number' ||
                    typeof el.frame?.width !== 'number' || typeof el.frame?.height !== 'number') {
                  throw new Error('Element ' + el.reactTag + ' has invalid frame: ' + JSON.stringify(el.frame));
                }
                if (typeof el.visible !== 'boolean') {
                  throw new Error('Element ' + el.reactTag + ' has non-boolean visible: ' + el.visible);
                }
                if (el.visible) hasVisibleElement = true;
                if (el.frame.width > 0 && el.frame.height > 0) hasNonZeroFrame = true;
              }
              if (!hasVisibleElement) throw new Error('No visible elements found');
              if (!hasNonZeroFrame) throw new Error('No elements with non-zero frame dimensions');
              console.log('structural validation: passed');

              session.disconnect();
              console.log('All element selection tests passed');
            })();
          "

      - name: Cleanup
        if: always()
        run: node packages/device/dist/cli.js kill --all

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-ios
          path: /tmp/screenshot.png
          retention-days: 7

  android:
    name: Android Injection Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build monorepo
        run: pnpm build

      - name: Setup Android SDK and CI dependencies
        uses: android-actions/setup-android@v3
        with:
          packages: ndk;26.1.10909125
      - run: |
          # KVM for hardware acceleration
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          # libpulse0 (emulator links it at load time regardless of -no-audio)
          sudo apt-get update -qq && sudo apt-get install -y -qq libpulse0
          # System image and emulator
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "system-images;android-34;google_apis;x86_64" "emulator" || true

      - name: Check device dependencies
        run: node packages/device/dist/cli.js check android-ci

      - name: Boot emulator
        run: node packages/device/dist/cli.js boot android-ci --timeout 120000

      - name: Build libjig.so
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/26.1.10909125"
          bash scripts/build-so.sh

      - name: Build jig-helpers.dex
        run: packages/native/scripts/build-dex.sh

      - name: Build jig-dex-patcher.jar
        run: |
          cd packages/native/android/dex-patcher
          gradle jar

      - name: Download test app artifact
        uses: actions/download-artifact@v4
        with:
          name: habit-tracker-android
          path: /tmp/test-app
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ vars.HABIT_TRACKER_ANDROID_BUILD_RUN_ID }}

      - name: Extract test APK
        run: |
          APK_PATH=$(find /tmp/test-app -name "*.apk" | head -1)
          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"

      - name: Launch app with Jig
        run: |
          export PATH="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1):$PATH"
          node packages/cli/dist/index.js launch "$APK_PATH" --skip-verify

      - name: Wait for Jig server
        run: node packages/cli/dist/index.js wait --timeout 120000

      - name: Verify connection
        run: node packages/cli/dist/index.js status

      - name: Verify element selection
        run: |
          node -e "
            const { connect } = require('./packages/sdk/dist');
            (async () => {
              const session = await connect();

              // Wait for app to render by polling for a known testID
              let homeScreen;
              const deadline = Date.now() + 30000;
              while (Date.now() < deadline) {
                try {
                  homeScreen = await session.findElement({ testID: 'jig-home-screen' });
                  break;
                } catch (err) {
                  if (err.code !== -32002) throw err;
                  process.stdout.write('.');
                  await new Promise(r => setTimeout(r, 500));
                }
              }
              if (!homeScreen) throw new Error('App did not render jig-home-screen within 30s');
              console.log('\\nApp ready: jig-home-screen found');

              // Test 1: findElements({}) returns meaningful element count
              const all = await session.findElements({});
              console.log('findElements: ' + all.elements.length + ' elements found');
              if (all.elements.length < 10) {
                throw new Error('Expected at least 10 elements, got ' + all.elements.length);
              }

              // Test 2: At least one element has testID
              const withTestID = all.elements.find(el => el.testID);
              if (!withTestID) {
                throw new Error('No elements with testID found — test app must have testID props');
              }
              const byTestID = await session.findElement({ testID: withTestID.testID });
              if (byTestID.element.reactTag !== withTestID.reactTag) {
                throw new Error('testID lookup returned wrong element');
              }
              console.log('findElement by testID: ' + withTestID.testID);
              }
              console.log('findElement jig-home-screen: found');

              // Test 4: Nonexistent testID returns ELEMENT_NOT_FOUND
              try {
                await session.findElement({ testID: 'jig-nonexistent-xyz' });
                throw new Error('Expected ELEMENT_NOT_FOUND error');
              } catch (err) {
                if (err.code !== -32002) throw new Error('Wrong error code: ' + err.code);
                console.log('ELEMENT_NOT_FOUND: correct error code');
              }

              // Test 5: text selector — must match non-trivial text
              const withText = all.elements.find(el => el.text && el.text.trim().length > 0);
              if (!withText) {
                throw new Error('No elements with non-empty text found');
              }
              const byText = await session.findElement({ text: withText.text });
              if (byText.element.text !== withText.text) {
                throw new Error('text selector mismatch');
              }
              console.log('findElement by text: \"' + withText.text + '\"');

              // Test 6: role selector with selectivity check
              const withRole = all.elements.find(el => el.role);
              if (!withRole) {
                throw new Error('No elements with role found');
              }
              const byRole = await session.findElement({ role: withRole.role });
              if (byRole.element.role !== withRole.role) {
                throw new Error('role selector returned element with wrong role');
              }
              const allByRole = await session.findElements({ role: withRole.role });
              for (const el of allByRole.elements) {
                if (el.role !== withRole.role) {
                  throw new Error('findElements({role}) returned element with role=' + el.role + ', expected ' + withRole.role);
                }
              }
              console.log('findElement by role: ' + withRole.role + ' (' + allByRole.elements.length + ' total, all match)');

              // Test 7: AND selector (text + role)
              const withTextAndRole = all.elements.find(el => el.text && el.text.trim().length > 0 && el.role);
              if (withTextAndRole) {
                const byAnd = await session.findElement({ text: withTextAndRole.text, role: withTextAndRole.role });
                if (byAnd.element.text !== withTextAndRole.text || byAnd.element.role !== withTextAndRole.role) {
                  throw new Error('AND selector mismatch');
                }
                console.log('AND selector: text=\"' + withTextAndRole.text + '\" + role=' + withTextAndRole.role);
              } else {
                throw new Error('No elements with both non-empty text and role');
              }

              // Test 8: structural validation — meaningful values
              let hasVisibleElement = false;
              let hasNonZeroFrame = false;
              for (const el of all.elements) {
                if (typeof el.frame?.x !== 'number' || typeof el.frame?.y !== 'number' ||
                    typeof el.frame?.width !== 'number' || typeof el.frame?.height !== 'number') {
                  throw new Error('Element ' + el.reactTag + ' has invalid frame: ' + JSON.stringify(el.frame));
                }
                if (typeof el.visible !== 'boolean') {
                  throw new Error('Element ' + el.reactTag + ' has non-boolean visible: ' + el.visible);
                }
                if (el.visible) hasVisibleElement = true;
                if (el.frame.width > 0 && el.frame.height > 0) hasNonZeroFrame = true;
              }
              if (!hasVisibleElement) throw new Error('No visible elements found');
              if (!hasNonZeroFrame) throw new Error('No elements with non-zero frame dimensions');
              console.log('structural validation: passed');

              session.disconnect();
              console.log('All element selection tests passed');
            })();
          "

      - name: Capture screenshot (best-effort)
        continue-on-error: true
        run: |
          node -e "
            const { connect } = require('./packages/sdk/dist');
            (async () => {
              const client = await connect();
              const result = await client.screenshot();
              require('fs').writeFileSync('/tmp/screenshot-android.png', Buffer.from(result.data, 'base64'));
              console.log('Screenshot: ' + result.width + 'x' + result.height + ' ' + result.format);
              await client.disconnect();
            })();
          "

      - name: Dump logcat on failure
        if: failure()
        timeout-minutes: 1
        run: |
          echo "=== adb devices ==="
          timeout 5 adb devices 2>&1 || true
          echo "=== logcat (last 50 lines) ==="
          timeout 10 adb logcat -d 2>&1 | tail -50 || echo "No logcat available"
          echo "=== logcat Jig/libjig ==="
          timeout 10 adb logcat -d 2>&1 | grep -i "jig\|habittracker" | tail -20 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-android
          path: |
            /tmp/test-app/
            /tmp/screenshot-android.png
          retention-days: 7

      - name: Cleanup
        if: always()
        run: node packages/device/dist/cli.js kill --all
