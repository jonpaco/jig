name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  c-core:
    name: C Core Tests
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        working-directory: packages/native/core
        run: |
          mkdir build && cd build
          cmake -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ..

      - name: Build
        working-directory: packages/native/core/build
        run: make -j$(sysctl -n hw.logicalcpu)

      - name: Test
        working-directory: packages/native/core/build
        run: ctest --output-on-failure

  android-jni:
    name: Android JNI Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: android-actions/setup-android@v3
        with:
          packages: ndk;26.1.10909125

      - name: Build libjig.so
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/26.1.10909125"
          bash scripts/build-so.sh

      - name: Verify outputs
        run: |
          test -f packages/native/build/android/arm64-v8a/libjig.so
          test -f packages/native/build/android/x86_64/libjig.so
          file packages/native/build/android/arm64-v8a/libjig.so
          file packages/native/build/android/x86_64/libjig.so
