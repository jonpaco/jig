name: Build Test App

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android
          - both

jobs:
  ios:
    name: Build iOS (.app)
    runs-on: macos-15
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    timeout-minutes: 30

    steps:
      - name: Clone Habit Tracker
        run: git clone --depth 1 https://github.com/jonpaco/open-source-habit-tracker-app.git app

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Prebuild iOS
        working-directory: app
        run: npx expo prebuild --platform ios

      - name: Build release (embeds JS bundle, no Metro needed)
        working-directory: app/ios
        run: |
          SCHEME=$(ls -d *.xcworkspace | head -1 | sed 's/.xcworkspace//')
          xcodebuild \
            -workspace *.xcworkspace \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            build

      - name: Package .app artifact
        run: |
          APP_PATH=$(find app/ios/build -name "*.app" -path "*/Release-iphonesimulator/*" | head -1)
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          # Tar to preserve symlinks and permissions
          tar -czf habit-tracker-ios.tar.gz -C "$(dirname "$APP_PATH")" "$(basename "$APP_PATH")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: habit-tracker-ios
          path: habit-tracker-ios.tar.gz
          retention-days: 90
