plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.jigtesting'
version = '0.1.0'

android {
  namespace "expo.modules.jig"
  defaultConfig {
    versionCode 1
    versionName '0.1.0'
  }
}

dependencies {
  implementation 'org.java-websocket:Java-WebSocket:1.6.0'
}
